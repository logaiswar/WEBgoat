name: WebGoat SBOM + SCA Security Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  sbom-sca-scan:
    runs-on: ubuntu-latest

    steps:

      # ------------------------------------------------
      # Checkout Source
      # ------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------
      # Setup Java 25
      # ------------------------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # ------------------------------------------------
      # Verify Environment
      # ------------------------------------------------
      - name: Verify Java & Maven
        run: |
          java -version
          mvn -version

      # ------------------------------------------------
      # Build WebGoat
      # ------------------------------------------------
      - name: Build WebGoat
        run: |
          mvn clean install -DskipTests

      # ------------------------------------------------
      # Install Syft (SBOM Generator)
      # ------------------------------------------------
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      # ------------------------------------------------
      # Verify Syft
      # ------------------------------------------------
      - name: Verify Syft
        run: syft version

      # ------------------------------------------------
      # Generate CycloneDX SBOM
      # ------------------------------------------------
      - name: Generate CycloneDX SBOM
        run: |
          syft dir:. -o cyclonedx-json > webgoat-sbom.json

      # ------------------------------------------------
      # Generate SPDX SBOM
      # ------------------------------------------------
      - name: Generate SPDX SBOM
        run: |
          syft dir:. -o spdx-json > webgoat-spdx.json

      # ------------------------------------------------
      # Install Grype (SCA Scanner)
      # ------------------------------------------------
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      # ------------------------------------------------
      # Verify Grype
      # ------------------------------------------------
      - name: Verify Grype
        run: grype version

      # ------------------------------------------------
      # Run SCA Vulnerability Scan
      # ------------------------------------------------
      - name: Run SCA Scan
        run: |
          grype sbom:webgoat-sbom.json -o table > sca-report.txt

      # ------------------------------------------------
      # Generate SARIF Report
      # ------------------------------------------------
      - name: Generate SARIF
        run: |
          grype sbom:webgoat-sbom.json -o sarif > grype-report.sarif

      # ------------------------------------------------
      # Upload SARIF to GitHub Security
      # ------------------------------------------------
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-report.sarif

      # ------------------------------------------------
      # Create HTML Report
      # ------------------------------------------------
      - name: Generate HTML Security Report
        run: |
          cat > security-report.html <<EOF
          <html>
          <head>
            <title>WebGoat Security Report</title>
            <style>
              body {
                font-family: Arial;
                margin: 40px;
                background: #f4f4f4;
              }
              h1 {
                color: #222;
              }
              pre {
                background: #fff;
                padding: 20px;
                border-radius: 8px;
                border: 1px solid #ccc;
                overflow-x: auto;
              }
            </style>
          </head>
          <body>

          <h1>WebGoat SBOM Report</h1>
          <pre>
          EOF

          cat webgoat-sbom.json >> security-report.html

          cat >> security-report.html <<EOF

          </pre>

          <h1>SCA Vulnerability Report</h1>
          <pre>
          EOF

          cat sca-report.txt >> security-report.html

          cat >> security-report.html <<EOF

          </pre>

          </body>
          </html>
          EOF

      # ------------------------------------------------
      # Upload Reports
      # ------------------------------------------------
      - name: Upload Security Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webgoat-security-reports
          path: |
            webgoat-sbom.json
            webgoat-spdx.json
            sca-report.txt
            grype-report.sarif
            security-report.html

      # ------------------------------------------------
      # Display Files
      # ------------------------------------------------
      - name: List Generated Files
        run: |
          ls -lah
