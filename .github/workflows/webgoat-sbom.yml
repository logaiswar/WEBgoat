name: WebGoat SBOM & Vulnerability Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  sbom-scan:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------
      # Checkout Source
      # -----------------------------------
      - name: Checkout Source
        uses: actions/checkout@v6

      # -----------------------------------
      # Setup Java 25
      # -----------------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      # -----------------------------------
      # Verify Java
      # -----------------------------------
      - name: Verify Java Version
        run: |
          java -version
          mvn -version

      # -----------------------------------
      # Cache Maven
      # -----------------------------------
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # -----------------------------------
      # Build WebGoat
      # -----------------------------------
      - name: Build WebGoat
        run: |
          mvn clean install -DskipTests

      # -----------------------------------
      # Install Syft
      # -----------------------------------
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      # -----------------------------------
      # Generate CycloneDX SBOM
      # -----------------------------------
      - name: Generate CycloneDX SBOM
        run: |
          syft dir:. -o cyclonedx-json > webgoat-sbom.json

      # -----------------------------------
      # Generate SPDX SBOM
      # -----------------------------------
      - name: Generate SPDX SBOM
        run: |
          syft dir:. -o spdx-json > webgoat-spdx.json

      # -----------------------------------
      # Install Grype
      # -----------------------------------
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      # -----------------------------------
      # Vulnerability Scan
      # -----------------------------------
      - name: Scan SBOM
        run: |
          grype sbom:webgoat-sbom.json -o table > vulnerability-report.txt

      # -----------------------------------
      # Generate SARIF
      # -----------------------------------
      - name: Generate SARIF Report
        run: |
          grype sbom:webgoat-sbom.json -o sarif > grype-report.sarif

      # -----------------------------------
      # Upload SARIF
      # -----------------------------------
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-report.sarif

      # -----------------------------------
      # Upload Artifacts
      # -----------------------------------
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: webgoat-security-reports
          path: |
            webgoat-sbom.json
            webgoat-spdx.json
            vulnerability-report.txt
            grype-report.sarif
