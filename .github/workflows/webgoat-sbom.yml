name: WebGoat SBOM & Vulnerability 

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  sbom-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Maven Cache
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # -----------------------------
      # Build Application
      # -----------------------------
      - name: Build WebGoat
        run: mvn clean install -DskipTests

      # -----------------------------
      # Install Syft
      # -----------------------------
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      # -----------------------------
      # Generate SBOM
      # -----------------------------
      - name: Generate CycloneDX SBOM
        run: |
          syft . -o cyclonedx-json > webgoat-sbom.json

      - name: Generate SPDX SBOM
        run: |
          syft . -o spdx-json > webgoat-spdx.json

      # -----------------------------
      # Install Grype
      # -----------------------------
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      # -----------------------------
      # Vulnerability Scan
      # -----------------------------
      - name: Scan SBOM for Vulnerabilities
        run: |
          grype sbom:webgoat-sbom.json -o table > vulnerability-report.txt

      - name: Generate SARIF Report
        run: |
          grype sbom:webgoat-sbom.json -o sarif > grype-report.sarif

      # -----------------------------
      # Upload SARIF to GitHub Security
      # -----------------------------
      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-report.sarif

      # -----------------------------
      # Upload Reports
      # -----------------------------
      - name: Upload SBOM Reports
        uses: actions/upload-artifact@v4
        with:
          name: webgoat-sbom-reports
          path: |
            webgoat-sbom.json
            webgoat-spdx.json
            vulnerability-report.txt
            grype-report.sarif
