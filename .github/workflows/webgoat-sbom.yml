name: WebGoat SBOM Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  sbom-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate CycloneDX SBOM
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.66.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.66.0_Linux-64bit.deb

      - name: Scan SBOM
        run: |
          trivy sbom target/bom.json \
            --format json \
            --output trivy-report.json

      - name: Download HTML Template
        run: |
          curl -L \
          https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
          -o html.tpl

      - name: Generate HTML Report
        run: |
          trivy sbom target/bom.json \
            --format template \
            --template "@html.tpl" \
            --output trivy-report.html

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: webgoat-security-reports
          path: |
            target/bom.json
            trivy-report.json
            trivy-report.html
