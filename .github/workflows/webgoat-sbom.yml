name: WebGoat SBOM Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  sbom-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build WebGoat
        run: mvn clean package -DskipTests

      - name: Generate CycloneDX SBOM
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom

      - name: Locate SBOM
        run: |
          find . -name "bom.json"

      - name: Install Trivy
        run: |
          sudo apt-get update
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Download HTML Template
        run: |
          curl -L https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl -o html.tpl

      - name: Scan SBOM JSON
        run: |
          SBOM=$(find . -name "bom.json" | head -1)

          trivy sbom "$SBOM" \
            --format json \
            --output trivy-report.json

      - name: Generate HTML Report
        run: |
          SBOM=$(find . -name "bom.json" | head -1)

          trivy sbom "$SBOM" \
            --format template \
            --template "@html.tpl" \
            --output trivy-report.html

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            **/bom.json

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-html-report
          path: trivy-report.html

      - name: Upload JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-json-report
          path: trivy-report.json
