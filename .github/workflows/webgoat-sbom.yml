name: WebGoat SBOM + Dependency-Track

on:
  push:
    branches:
      - main

jobs:
  sbom-scan:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------
      # Checkout Source
      # --------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # --------------------------------
      # Setup Java
      # --------------------------------
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # --------------------------------
      # Fix Java Version
      # --------------------------------
      - name: Fix pom.xml
        run: |
          sed -i 's/<maven.compiler.release>25<\/maven.compiler.release>/<maven.compiler.release>21<\/maven.compiler.release>/g' pom.xml || true
          sed -i 's/<java.version>25<\/java.version>/<java.version>21<\/java.version>/g' pom.xml || true

      # --------------------------------
      # Build WebGoat
      # --------------------------------
      - name: Build Application
        run: mvn clean install -DskipTests

      # --------------------------------
      # Generate SBOM
      # --------------------------------
      - name: Generate CycloneDX SBOM
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      # --------------------------------
      # Start Dependency-Track
      # --------------------------------
      - name: Run Dependency-Track
        run: |
          docker pull dependencytrack/bundled:latest

          docker run -d \
            --name dependency-track \
            -p 8081:8080 \
            dependencytrack/bundled:latest

      # --------------------------------
      # Wait for Dependency-Track
      # --------------------------------
      - name: Wait for Dependency-Track Startup
        run: |
          echo "Waiting for Dependency-Track..."
          sleep 180

          docker ps

          curl -I http://localhost:8081
      # --------------------------------
      # Upload BOM
      # --------------------------------
      - name: Upload BOM to Dependency-Track
        env:
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          curl -X POST "http://localhost:8081/api/v1/bom" \
          -H "X-Api-Key: odt_3Dl3N4oI_cTeKg6XpuyyI2WkCrJ4M06eoBoIWK2lv" \
          -H "Content-Type: multipart/form-data" \
          -F "autoCreate=true" \
          -F "projectName=WebGoat" \
          -F "projectVersion=1.0.${{ github.run_number }}" \
          -F "bom=@target/bom.xml"

      # --------------------------------
      # Upload SBOM Artifact
      # --------------------------------
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgoat-sbom
          path: |
            target/bom.xml
            target/bom.json
