name: WebGoat SBOM & Vulnerability Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  sbom-scan:
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------
      # Checkout Repository
      # -----------------------------------
      - name: Checkout Source
        uses: actions/checkout@v4

      # -----------------------------------
      # Setup Java 25
      # -----------------------------------
      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # -----------------------------------
      # Verify Java & Maven
      # -----------------------------------
      - name: Verify Environment
        run: |
          java -version
          mvn -version

      # -----------------------------------
      # Build WebGoat
      # -----------------------------------
      - name: Build WebGoat
        run: |
          mvn clean install -DskipTests

      # -----------------------------------
      # Install Syft
      # -----------------------------------
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      # -----------------------------------
      # Verify Syft
      # -----------------------------------
      - name: Verify Syft
        run: syft version

      # -----------------------------------
      # Generate CycloneDX SBOM
      # -----------------------------------
      - name: Generate CycloneDX SBOM
        run: |
          syft dir:. -o cyclonedx-json > webgoat-sbom.json

      # -----------------------------------
      # Generate SPDX SBOM
      # -----------------------------------
      - name: Generate SPDX SBOM
        run: |
          syft dir:. -o spdx-json > webgoat-spdx.json

      # -----------------------------------
      # Install Grype
      # -----------------------------------
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      # -----------------------------------
      # Verify Grype
      # -----------------------------------
      - name: Verify Grype
        run: grype version

      # -----------------------------------
      # Vulnerability Scan
      # -----------------------------------
      - name: Scan SBOM for Vulnerabilities
        run: |
          grype sbom:webgoat-sbom.json -o table > vulnerability-report.txt

      # -----------------------------------
      # Generate SARIF Report
      # -----------------------------------
      - name: Generate SARIF Report
        run: |
          grype sbom:webgoat-sbom.json -o sarif > grype-report.sarif

      # -----------------------------------
      # Upload SARIF to GitHub Security
      # -----------------------------------
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-report.sarif

      # -----------------------------------
      # Upload Reports
      # -----------------------------------
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: webgoat-security-reports
          path: |
            webgoat-sbom.json
            webgoat-spdx.json
            vulnerability-report.txt
            grype-report.sarif

      # -----------------------------------
      # Display Generated Files
      # -----------------------------------
      - name: List Generated Reports
        run: |
          ls -lah
