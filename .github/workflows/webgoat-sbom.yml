name: WebGoat SBOM Upload to Dependency-Track

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  dependency-track:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Source
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Verify Java Version
      - name: Verify Java
        run: java -version

      # Build WebGoat Application
      - name: Build WebGoat
        run: |
          chmod +x mvnw
          ./mvnw clean install -DskipTests

      # Generate CycloneDX SBOM
      - name: Generate SBOM
        run: |
          ./mvnw org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      # Verify SBOM
      - name: Verify SBOM File
        run: |
          ls -lah target
          cat target/bom.xml | head -20

      # Upload SBOM to Dependency-Track
      - name: Upload BOM to Dependency-Track
        env:
          DTRACK_URL: http://localhost:8081/projects/d5daa6b8-71f3-4b87-9d12-a1f73972ba8f
          DTRACK_API_KEY: odt_3Dl3N4oI_cTeKg6XpuyyI2WkCrJ4M06eoBoIWK2lv 
        run: |
          curl -X POST "${DTRACK_URL}/api/v1/bom" \
          -H "X-Api-Key: ${DTRACK_API_KEY}" \
          -H "Content-Type: multipart/form-data" \
          -F "autoCreate=true" \
          -F "projectName=WebGoat" \
          -F "projectVersion=1 \
          -F "bom=@target/bom.xml"

      # Upload SBOM Artifact
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgoat-sbom
          path: target/bom.xml
