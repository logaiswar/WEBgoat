```
permissions:
  contents: read

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '21'

  - name: Cache Maven Dependencies
    uses: actions/cache@v4
    with:
      path: ~/.m2/repository
      key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
      restore-keys: |
        ${{ runner.os }}-maven-

  - name: Build WebGoat
    run: |
      mvn clean package -DskipTests

  - name: Generate CycloneDX SBOM
    run: |
      mvn org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom

  - name: Verify SBOM
    run: |
      ls -la target/
      find . -name "*.json"

  - name: Install Trivy
    run: |
      sudo apt-get update
      sudo apt-get install -y wget rpm

      wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
        | sudo sh -s -- -b /usr/local/bin

      trivy --version

  - name: Scan SBOM (JSON)
    run: |
      trivy sbom target/bom.json \
        --format json \
        --output trivy-report.json

  - name: Download HTML Template
    run: |
      curl -L \
      https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
      -o html.tpl

  - name: Generate HTML Report
    run: |
      trivy sbom target/bom.json \
        --format template \
        --template "@html.tpl" \
        --output trivy-report.html

  - name: Upload SBOM
    uses: actions/upload-artifact@v4
    with:
      name: sbom-report
      path: target/bom.json

  - name: Upload Trivy JSON Report
    uses: actions/upload-artifact@v4
    with:
      name: trivy-json-report
      path: trivy-report.json

  - name: Upload Trivy HTML Report
    uses: actions/upload-artifact@v4
    with:
      name: trivy-html-report
      path: trivy-report.html

  - name: Upload All Reports
    uses: actions/upload-artifact@v4
    with:
      name: webgoat-security-reports
      path: |
        target/bom.json
        trivy-report.json
        trivy-report.html
