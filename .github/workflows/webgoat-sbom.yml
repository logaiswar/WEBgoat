name: SBOM Dependency-Track Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sbom-scan:
    runs-on: ubuntu-latest

    env:
      DTRACK_URL: http://YOUR_DEPENDENCY_TRACK_SERVER:8080
      PROJECT_NAME: NodeGoat
      PROJECT_VERSION: "1.0"

    steps:
      # Checkout Source Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install Application Dependencies
      - name: Install Dependencies
        run: |
          npm install

      # Install Syft
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin

      # Verify Syft
      - name: Verify Syft
        run: syft version

      # Generate CycloneDX SBOM
      - name: Generate SBOM
        run: |
          syft . -o cyclonedx-json > sbom.json

      # Display SBOM File
      - name: Show SBOM
        run: |
          cat sbom.json | head -50

      # Upload SBOM Artifact
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.json

      # Upload SBOM to Dependency-Track
      - name: Upload SBOM to Dependency-Track
        run: |
          curl -X POST "${DTRACK_URL}/api/v1/bom" \
            -H "X-Api-Key: ${{ secrets.DTRACK_API_KEY }}" \
            -F "projectName=${PROJECT_NAME}" \
            -F "projectVersion=${PROJECT_VERSION}" \
            -F "autoCreate=true" \
            -F "bom=@sbom.json"

      # Install Grype
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
          | sh -s -- -b /usr/local/bin

      # Scan SBOM with Grype
      - name: Scan SBOM
        run: |
          grype sbom:sbom.json -o table

      # Save Grype Report
      - name: Export Grype Report
        run: |
          grype sbom:sbom.json -o json > grype-report.json

      # Upload Vulnerability Report
      - name: Upload Vulnerability Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grype-report
          path: grype-report.json
