name: WebGoat SBOM + Dependency-Track

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sbom-dependencytrack:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ---------------------------------
      # Checkout Source
      # ---------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------------
      # Setup Java
      # ---------------------------------
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # ---------------------------------
      # Verify Java & Maven
      # ---------------------------------
      - name: Verify Environment
        run: |
          java -version
          mvn -version

      # ---------------------------------
      # Fix Java Release Version
      # ---------------------------------
      - name: Fix pom.xml Java Version
        run: |
          sed -i 's/<maven.compiler.release>25<\/maven.compiler.release>/<maven.compiler.release>21<\/maven.compiler.release>/g' pom.xml || true
          sed -i 's/<java.version>25<\/java.version>/<java.version>21<\/java.version>/g' pom.xml || true

      # ---------------------------------
      # Build WebGoat
      # ---------------------------------
      - name: Build Application
        run: mvn clean install -DskipTests

      # ---------------------------------
      # Generate CycloneDX SBOM
      # ---------------------------------
      - name: Generate SBOM
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      # ---------------------------------
      # Verify SBOM Files
      # ---------------------------------
      - name: List Generated SBOM
        run: |
          ls -la target/
          test -f target/bom.xml
          test -f target/bom.json

      # ---------------------------------
      # Upload SBOM Artifact
      # ---------------------------------
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgoat-sbom
          path: |
            target/bom.xml
            target/bom.json

      # ---------------------------------
      # Publish SBOM to Dependency-Track
      # ---------------------------------
      - name: Publish BOM to Dependency-Track
        run: |
          curl -X POST "http://localhost:8081/projects/d5daa6b8-71f3-4b87-9d12-a1f73972ba8f/api/v1/bom" \
          -H "X-Api-Key: odt_3Dl3N4oI_cTeKg6XpuyyI2WkCrJ4M06eoBoIWK2lv" \
          -H "Content-Type: multipart/form-data" \
          -F "autoCreate=true" \
          -F "projectName=WebGoat" \
          -F "projectVersion=2.0.${{ github.run_number }}" \
          -F "bom=@target/bom.xml"
