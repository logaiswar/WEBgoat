name: WebGoat SBOM Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sbom-scan:
    runs-on: ubuntu-latest

    env:
      DTRACK_URL: http://YOUR_DEPENDENCY_TRACK_SERVER:8080
      PROJECT_NAME: WebGoat
      PROJECT_VERSION: "1.0"

    steps:
      # Checkout Repository
      - name: Checkout Source
        uses: actions/checkout@v4

      # Setup Java 25
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      # Verify Java
      - name: Verify Java
        run: |
          java -version
          javac -version

      # Verify Maven
      - name: Verify Maven
        run: mvn -version

      # Build WebGoat
      - name: Build Application
        run: |
          mvn clean install -DskipTests

      # Install Syft
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin

      # Verify Syft
      - name: Verify Syft
        run: syft version

      # Generate CycloneDX SBOM
      - name: Generate SBOM
        run: |
          syft . -o cyclonedx-json > sbom.json

      # Display SBOM Summary
      - name: Show SBOM
        run: |
          cat sbom.json | head -50

      # Upload SBOM Artifact
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.json

      # Upload SBOM to Dependency-Track
      - name: Upload SBOM to Dependency-Track
        run: |
          curl -X POST "${DTRACK_URL}/api/v1/bom" \
            -H "X-Api-Key: ${{ secrets.DTRACK_API_KEY }}" \
            -F "projectName=${PROJECT_NAME}" \
            -F "projectVersion=${PROJECT_VERSION}" \
            -F "autoCreate=true" \
            -F "bom=@sbom.json"

      # Install Grype
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
          | sh -s -- -b /usr/local/bin

      # Verify Grype
      - name: Verify Grype
        run: grype version

      # Scan SBOM
      - name: Scan SBOM with Grype
        run: |
          grype sbom:sbom.json -o table

      # Export JSON Report
      - name: Export Grype JSON Report
        run: |
          grype sbom:sbom.json -o json > grype-report.json

      # Upload Vulnerability Report
      - name: Upload Vulnerability Report
        uses: actions/upload-artifact@v4
        with:
          name: grype-report
          path: grype-report.json
